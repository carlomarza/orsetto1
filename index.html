<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>L'Orsetto Nuotatore Vocale - Pro Version</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
            color: white;
            user-select: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #pulsante-avvio {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 22px;
            cursor: pointer;
            background-color: #FF69B4;
            color: white;
            border: 4px solid white;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 30;
        }
        
        /* BOTTONE PER APRIRE/CHIUDERE IL MENU */
        #TriggerMenu {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.75);
            color: #00ffcc;
            border: 2px solid white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            z-index: 25;
            display: none; /* Appare solo a gioco avviato */
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        /* PANNELLO DI CONTROLLO A SCOMPARSA (Slitta dall'alto) */
        #pannello-controllo {
            position: absolute;
            top: -400px; /* Nascosto inizialmente sopra lo schermo */
            left: 10px;
            background-color: rgba(0, 0, 0, 0.85);
            padding: 15px;
            border-radius: 15px;
            font-size: 13px;
            z-index: 20;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255,255,255,0.2);
            width: 260px;
            transition: top 0.4s ease-in-out; /* Animazione fluida di apertura */
        }
        
        /* Classe attivata via JavaScript per mostrare il menu */
        #pannello-controllo.aperto {
            top: 55px; /* Scende sotto il bottone di trigger */
        }

        .controllo-gruppo {
            margin-bottom: 8px;
        }
        .controllo-gruppo label {
            display: block;
            margin-bottom: 2px;
            color: #00ffcc;
            font-weight: bold;
        }
        .controllo-gruppo input {
            width: 100%;
        }
        .btn-touch {
            background-color: #4682B4;
            color: white;
            border: 2px solid white;
            padding: 6px 12px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            margin-top: 5px;
            width: 100%;
            display: block;
        }
        #avviso-landscape {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #87CEEB;
            z-index: 40;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="avviso-landscape">
        <p style="font-size: 24px;">Gira il dispositivo in Orizzontale!<br><small>Attiva la rotazione automatica</small></p>
    </div>

    <button id="pulsante-avvio">🐻 ENTRA NEL MARE DELLE CARAMELLE! 🍭</button>

    <button id="TriggerMenu">⚙️ Opzioni Menu</button>

    <div id="pannello-controllo">
        <div class="controllo-gruppo">
            <label>Voce Grave (Min): <span id="val-min">150</span> Hz</label>
            <input type="range" id="freq-min" min="60" max="400" value="150">
        </div>
        <div class="controllo-gruppo">
            <label>Voce Acuta (Max): <span id="val-max">800</span> Hz</label>
            <input type="range" id="freq-max" min="400" max="2000" value="800">
        </div>
        <div class="controllo-gruppo">
            <label>Velocità Caramelle: <span id="val-vel">3</span></label>
            <input type="range" id="vel-caramelle" min="1" max="10" step="0.5" value="3">
        </div>
        
        <div class="controllo-gruppo">
            <label>Quantità Caramelle (Ritmo): <span id="val-qty">Media</span></label>
            <input type="range" id="qty-caramelle" min="30" max="180" step="15" value="90">
        </div>

        <div class="controllo-gruppo">
            <label>Dimensione Base Orso: <span id="val-size">35</span></label>
            <input type="range" id="size-orso" min="15" max="80" value="35">
        </div>
        
        <button class="btn-touch" id="btn-toggle-reattivo">Grandezza Vocale: SI</button>
        <button class="btn-touch" id="btn-cambia-faccia" style="background-color: #FF8C00;">🎭 Cambia Faccia (Orsetto)</button>
    </div>

    <canvas id="quadroGioco"></canvas>

    <script>
        const canvas = document.getElementById('quadroGioco');
        const ctx = canvas.getContext('2d');
        const pulsante = document.getElementById('pulsante-avvio');
        const avviso = document.getElementById('avviso-landscape');
        const pannello = document.getElementById('pannello-controllo');
        const triggerMenu = document.getElementById('TriggerMenu');

        const sliderMin = document.getElementById('freq-min');
        const sliderMax = document.getElementById('freq-max');
        const sliderVel = document.getElementById('vel-caramelle');
        const sliderQty = document.getElementById('qty-caramelle');
        const sliderSize = document.getElementById('size-orso');
        
        const txtMin = document.getElementById('val-min');
        const txtMax = document.getElementById('val-max');
        const txtVel = document.getElementById('val-vel');
        const txtQty = document.getElementById('val-qty');
        const txtSize = document.getElementById('val-size');
        
        const btnToggleReattivo = document.getElementById('btn-toggle-reattivo');
        const btnCambiaFaccia = document.getElementById('btn-cambia-faccia');

        // Parametri iniziali
        let FREQ_MIN = 150;
        let FREQ_MAX = 800;
        let VELOCITA_MOLTIPLICATORE = 3.0;
        let SPAWN_RITMO = 90; // Frame di attesa tra una caramella e l'altra (meno frame = più caramelle)
        let GRANDEZZA_BASE = 35;
        let GRANDEZZA_REATTIVA = true;

        // Gestione Menu a scomparsa al click/tocco
        triggerMenu.addEventListener('click', () => {
            pannello.classList.toggle('aperto');
        });

        // Configurazione cursori
        sliderMin.addEventListener('input', (e) => { FREQ_MIN = parseInt(e.target.value); txtMin.innerText = FREQ_MIN; });
        sliderMax.addEventListener('input', (e) => { FREQ_MAX = parseInt(e.target.value); txtMax.innerText = FREQ_MAX; });
        sliderVel.addEventListener('input', (e) => { VELOCITA_MOLTIPLICATORE = parseFloat(e.target.value); txtVel.innerText = VELOCITA_MOLTIPLICATORE; });
        sliderSize.addEventListener('input', (e) => { GRANDEZZA_BASE = parseInt(e.target.value); txtSize.innerText = GRANDEZZA_BASE; orsetto.raggioBase = GRANDEZZA_BASE; });
        
        // Mappatura testo per il ritmo delle caramelle
        sliderQty.addEventListener('input', (e) => { 
            SPAWN_RITMO = parseInt(e.target.value); 
            if(SPAWN_RITMO <= 45) txtQty.innerText = "Tantissime! 🔥";
            else if(SPAWN_RITMO <= 75) txtQty.innerText = "Molte";
            else if(SPAWN_RITMO <= 110) txtQty.innerText = "Media";
            else if(SPAWN_RITMO <= 150) txtQty.innerText = "Poche";
            else txtQty.innerText = "Rarissime 💤";
        });

        btnToggleReattivo.addEventListener('click', () => {
            GRANDEZZA_REATTIVA = !GRANDEZZA_REATTIVA;
            btnToggleReattivo.innerText = GRANDEZZA_REATTIVA ? "Grandezza Vocale: SI" : "Grandezza Vocale: NO";
            btnToggleReattivo.style.backgroundColor = GRANDEZZA_REATTIVA ? "#4682B4" : "#808080";
        });

        // Logica facce bambini
        let facceBambini = [];
        let indiceFacciaAttuale = -1;
        for (let i = 1; i <= 3; i++) {
            let img = new Image();
            img.src = `bambino${i}.png`;
            img.onload = () => { facceBambini.push({ id: i, img: img }); };
        }

        btnCambiaFaccia.addEventListener('click', () => {
            if (facceBambini.length === 0) {
                alert("Carica i file bambino1.png, bambino2.png su GitHub per attivare questa opzione!");
                return;
            }
            indiceFacciaAttuale++;
            if (indiceFacciaAttuale >= facceBambini.length) indiceFacciaAttuale = -1;
            btnCambiaFaccia.innerText = "🎭 Faccia: " + (indiceFacciaAttuale === -1 ? "Orsetto" : `Bambino ${facceBambini[indiceFacciaAttuale].id}`);
        });

        // Stato Oggetti
        let orsetto = { x: 180, y: window.innerHeight / 2, raggioBase: 35, raggioAttuale: 35 };
        let caramelle = [];
        let punteggio = 0;
        let giocoAvviato = false;
        let timerCaramelle = 0;
        let tempoAnimazione = 0;
        let timerFlash = 0;

        let audioContext, analyser, dataArray;

        let sfondoImg = new Image();
        let sfondoCaricato = false;
        sfondoImg.src = "sfondo.jpg";
        sfondoImg.onload = () => { sfondoCaricato = true; };

        function controllaOrientamento() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (window.innerHeight > window.innerWidth) {
                avviso.style.display = "flex";
            } else {
                avviso.style.display = "none";
                if (orsetto.y > canvas.height) orsetto.y = canvas.height / 2;
            }
        }

        window.addEventListener('resize', controllaOrientamento);
        window.addEventListener('orientationchange', () => { setTimeout(controllaOrientamento, 300); });
        controllaOrientamento();

        pulsante.addEventListener('click', async () => {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
            }
            pulsante.style.display = 'none';
            triggerMenu.style.display = 'block'; // Mostra l'ingranaggio delle opzioni
            await inizializzaAudio();
            giocoAvviato = true;
            loopPrincipale();
        });

        let audioGnam = new Audio('gnam.wav');
        function playSuonoGnam() {
            audioGnam.play().catch(() => {
                if (!audioContext) return;
                let osc = audioContext.createOscillator();
                let guadagno = audioContext.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, audioContext.currentTime);
                osc.frequency.exponentialRampToValueAtTime(
