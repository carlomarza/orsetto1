<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>L'Orsetto Nuotatore Vocale - Android Definitivo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
            color: white;
            user-select: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #pulsante-avvio {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 22px;
            cursor: pointer;
            background-color: #FF69B4;
            color: white;
            border: 4px solid white;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 50;
        }
        #TriggerMenu {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.8);
            color: #00ffcc;
            border: 2px solid white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            z-index: 25;
            display: none;
        }
        #pannello-controllo {
            position: absolute;
            top: -500px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.9);
            padding: 15px;
            border-radius: 15px;
            font-size: 13px;
            z-index: 20;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255,255,255,0.3);
            width: 260px;
            max-height: 75vh; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
            transition: top 0.4s ease-in-out;
        }
        #pannello-controllo.aperto {
            top: 55px;
        }
        .controllo-gruppo {
            margin-bottom: 10px;
        }
        .controllo-gruppo label {
            display: block;
            margin-bottom: 3px;
            color: #00ffcc;
            font-weight: bold;
        }
        .controllo-gruppo input {
            width: 100%;
            height: 20px; 
        }
        .btn-touch {
            background-color: #4682B4;
            color: white;
            border: 2px solid white;
            padding: 8px 12px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            margin-top: 6px;
            width: 100%;
            display: block;
        }
        #avviso-landscape {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #87CEEB;
            z-index: 45;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        /* Schermata rossa di emergenza per leggere gli errori su Android */
        #schermo-errore {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(200, 0, 0, 0.95);
            color: white;
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
            font-family: monospace;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div id="schermo-errore">
        <h2>⚠️ Errore rilevato nel codice:</h2>
        <pre id="testo-errore" style="background:#222; padding:15px; border-radius:5px; white-space:pre-wrap;"></pre>
        <button onclick="document.getElementById('schermo-errore').style.display='none'" style="padding:10px;">Chiudi</button>
    </div>

    <div id="avviso-landscape">
        <p style="font-size: 24px;">Gira il dispositivo in Orizzontale!<br><small>Attiva la rotazione automatica</small></p>
    </div>

    <button id="pulsante-avvio">🐻 ENTRA NEL MARE DELLE CARAMELLE! 🍭</button>

    <button id="TriggerMenu">⚙️ Opzioni Menu</button>

    <div id="pannello-controllo">
        <div class="controllo-gruppo">
            <label>Voce Grave (Min): <span id="val-min">150</span> Hz</label>
            <input type="range" id="freq-min" min="60" max="400" value="150">
        </div>
        <div class="controllo-gruppo">
            <label>Voce Acuta (Max): <span id="val-max">800</span> Hz</label>
            <input type="range" id="freq-max" min="400" max="2000" value="800">
        </div>
        <div class="controllo-gruppo">
            <label>Velocità Caramelle: <span id="val-vel">3</span></label>
            <input type="range" id="vel-caramelle" min="1" max="10" step="0.5" value="3">
        </div>
        <div class="controllo-gruppo">
            <label>Quantità Caramelle: <span id="val-qty">Media</span></label>
            <input type="range" id="qty-caramelle" min="30" max="180" step="15" value="90">
        </div>
        <div class="controllo-gruppo">
            <label>Dimensione Base Orso: <span id="val-size">35</span></label>
            <input type="range" id="size-orso" min="15" max="80" value="35">
        </div>
        
        <button class="btn-touch" id="btn-toggle-reattivo">Grandezza Vocale: SI</button>
        <button class="btn-touch" id="btn-cambia-faccia" style="background-color: #FF8C00;">🎭 Cambia Faccia (Orsetto)</button>
    </div>

    <canvas id="quadroGioco"></canvas>

    <script>
        // Cattura gli errori e mostrali a schermo su Android
        window.onerror = function(message, source, lineno, colno, error) {
            document.getElementById('schermo-errore').style.display = 'block';
            document.getElementById('testo-errore').innerText = message + '\nLinea: ' + lineno;
            return false;
        };

        const canvas = document.getElementById('quadroGioco');
        const ctx = canvas.getContext('2d');
        const pulsante = document.getElementById('pulsante-avvio');
        const avviso = document.getElementById('avviso-landscape');
        const pannello = document.getElementById('pannello-controllo');
        const triggerMenu = document.getElementById('TriggerMenu');

        const sliderMin = document.getElementById('freq-min');
        const sliderMax = document.getElementById('freq-max');
        const sliderVel = document.getElementById('vel-caramelle');
        const sliderQty = document.getElementById('qty-caramelle');
        const sliderSize = document.getElementById('size-orso');
        
        const txtMin = document.getElementById('val-min');
        const txtMax = document.getElementById('val-max');
        const txtVel = document.getElementById('val-vel');
        const txtQty = document.getElementById('val-qty');
        const txtSize = document.getElementById('val-size');
        
        const btnToggleReattivo = document.getElementById('btn-toggle-reattivo');
        const btnCambiaFaccia = document.getElementById('btn-cambia-faccia');

        let FREQ_MIN = 150;
        let FREQ_MAX = 800;
        let VELOCITA_MOLTIPLICATORE = 3.0;
        let SPAWN_RITMO = 90; 
        let GRANDEZZA_BASE = 35;
        let GRANDEZZA_REATTIVA = true;

        triggerMenu.addEventListener('click', () => {
            pannello.classList.toggle('aperto');
        });

        sliderMin.addEventListener('input', (e) => { FREQ_MIN = parseInt(e.target.value); txtMin.innerText = FREQ_MIN; });
        sliderMax.addEventListener('input', (e) => { FREQ_MAX = parseInt(e.target.value); txtMax.innerText = FREQ_MAX; });
        sliderVel.addEventListener('input', (e) => { VELOCITA_MOLTIPLICATORE = parseFloat(e.target.value); txtVel.innerText = VELOCITA_MOLTIPLICATORE; });
        sliderSize.addEventListener('input', (e) => { GRANDEZZA_BASE = parseInt(e.target.value); txtSize.innerText = GRANDEZZA_BASE; orsetto.raggioBase = GRANDEZZA_BASE; });
        
        sliderQty.addEventListener('input', (e) => { 
            SPAWN_RITMO = parseInt(e.target.value); 
            if(SPAWN_RITMO <= 45) txtQty.innerText = "Tantissime! 🔥";
            else if(SPAWN_RITMO <= 75) txtQty.innerText = "Molte";
            else if(SPAWN_RITMO <= 110) txtQty.innerText = "Media";
            else if(SPAWN_RITMO <= 150) txtQty.innerText = "Poche";
            else txtQty.innerText = "Rarissime 💤";
        });

        btnToggleReattivo.addEventListener('click', () => {
            GRANDEZZA_REATTIVA = !GRANDEZZA_REATTIVA;
            btnToggleReattivo.innerText = GRANDEZZA_REATTIVA ? "Grandezza Vocale: SI" : "Grandezza Vocale: NO";
            btnToggleReattivo.style.backgroundColor = GRANDEZZA_REATTIVA ? "#4682B4" : "#808080";
        });

        let facceBambini = [];
        let indiceFacciaAttuale = -1;
        for (let i = 1; i <= 3; i++) {
            let img = new Image();
            img.src = `bambino${i}.png`;
            img.onload = () => { facceBambini.push({ id: i, img: img }); };
        }

        btnCambiaFaccia.addEventListener('click', () => {
            if (facceBambini.length === 0) {
                alert("Nessuna foto 'bambino1.png' trovata su GitHub.");
                return;
            }
            indiceFacciaAttuale++;
            if (indiceFacciaAttuale >= facceBambini.length) indiceFacciaAttuale = -1;
            btnCambiaFaccia.innerText = "🎭 Faccia: " + (indiceFacciaAttuale === -1 ? "Orsetto" : `Bambino ${facceBambini[indiceFacciaAttuale].id}`);
        });

        let orsetto = { x: 180, y: window.innerHeight / 2, raggioBase: 35, raggioAttuale: 35 };
        let caramelle = [];
        let punteggio = 0;
        let giocoAvviato = false;
        let timerCaramelle = 0;
        let tempoAnimazione = 0;
        let timerFlash = 0;

        let audioContext, analyser, dataArray;

        let sfondoImg = new Image();
        let sfondoCaricato = false;
        sfondoImg.src = "sfondo.jpg";
        sfondoImg.onload = () => { sfondoCaricato = true; };

        function controllaOrientamento() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (window.innerHeight > window.innerWidth) {
                avviso.style.display = "flex";
            } else {
                avviso.style.display = "none";
                if (orsetto.y > canvas.height) orsetto.y = canvas.height / 2;
            }
        }

        window.addEventListener('resize', controllaOrientamento);
        window.addEventListener('orientationchange', () => { setTimeout(controllaOrientamento, 300); });
        controllaOrientamento();

        // CORREZIONE SINTASSI APPLICATA QUI (giocoAvviato = true tutto in minuscolo)
        pulsante.addEventListener('click', () => {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
            }
            pulsante.style.display = 'none';
            triggerMenu.style.display = 'block'; 
            giocoAvviato = true;
            loopPrincipale();
            inizializzaAudio();
        });

        async function inizializzaAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const sorgente = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                sorgente.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            } catch (err) {
                console.log("Inizializzazione microfono fallita.");
            }
        }

        let audioGnam = new Audio('gnam.wav');
        function playSuonoGnam() {
            audioGnam.play().catch(() => {
                if (!audioContext) return;
                let osc = audioContext.createOscillator();
                let guadagno = audioContext.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, audioContext.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioContext.currentTime + 0.15);
                guadagno.gain.setValueAtTime(0.3, audioContext.currentTime);
                guadagno.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
                osc.connect(guadagno); guadagno.connect(audioContext.destination);
                osc.start(); osc.stop(audioContext.currentTime + 0.15);
            });
        }

        function analizzaAudio() {
            if (!analyser) return { volume: 0, frequenza: 0 };
            analyser.getByteFrequencyData(dataArray);
            let volumeMassimo = 0, indiceFrequenzaMassima = 0;
            for (let i = 0; i < dataArray.length; i++) {
                if (dataArray[i] > volumeMassimo) {
                    volumeMassimo = dataArray[i];
                    indiceFrequenzaMassima = i;
                }
            }
            return {
                volume: volumeMassimo / 255,
                frequenza: indiceFrequenzaMassima * audioContext.sampleRate / analyser.fftSize
            };
        }

        function disegnaOrsettoCompleto(x, y, r) {
            ctx.save();
            let oscillazione = Math.sin(tempoAnimazione) * (r * 0.4);

            ctx.fillStyle = "#8B4513";
            ctx.beginPath(); ctx.arc(x - r * 0.4 + oscillazione, y - r * 0.8, r * 0.3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(x - r * 0.4 - oscillazione, y + r * 0.8, r * 0.3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(x + r * 0.6 - oscillazione, y - r * 0.6, r * 0.28, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(x + r * 0.6 + oscillazione, y + r * 0.6, r * 0.28, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = "#A0522D";
            ctx.beginPath(); ctx.ellipse(x, y, r * 1.2, r * 0.8, 0, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = "#8B4513";
            ctx.beginPath(); ctx.arc(x - r * 0.5, y - r * 1.3, r * 0.3, 0, Math.PI * 2); ctx.arc(x + r * 0.3, y - r * 1.3, r * 0.3, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#FFB6C1";
            ctx.beginPath(); ctx.arc(x - r * 0.5, y - r * 1.3, r * 0.15, 0, Math.PI * 2); ctx.arc(x + r * 0.3, y - r * 1.3, r * 0.15, 0, Math.PI * 2); ctx.fill();

            if (indiceFacciaAttuale >= 0 && facceBambini[indiceFacciaAttuale]) {
                let imgBimbo = facceBambini[indiceFacciaAttuale].img;
                let dimTesta = r * 1.6;
                ctx.save();
                ctx.beginPath();
                ctx.arc(x - r * 0.2, y - r * 0.6, r * 0.8, 0, Math.PI * 2);
                ctx.clip();
                ctx.drawImage(imgBimbo, x - r * 0.2 - r * 0.8, y - r * 0.6 - r * 0.8, dimTesta, dimTesta);
                ctx.restore();
            } else {
                ctx.fillStyle = "#A0522D";
                ctx.beginPath(); ctx.arc(x - r * 0.2, y - r * 0.6, r * 0.8, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "#FFF8DC";
                ctx.beginPath(); ctx.arc(x - r * 0.2, y - r * 0.4, r * 0.35, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "#000000";
                ctx.beginPath(); ctx.arc(x - r * 0.2, y - r * 0.5, r * 0.1, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(x - r * 0.4, y - r * 0.8, r * 0.08, 0, Math.PI * 2); ctx.arc(x + r * 0.0, y - r * 0.8, r * 0.08, 0, Math.PI * 2); ctx.fill();
            }
            ctx.restore();
        }

        function disegnaCaramella(x, y, colore) {
            ctx.save(); ctx.fillStyle = colore; ctx.beginPath();
            ctx.moveTo(x - 22, y - 8); ctx.lineTo(x - 22, y + 8); ctx.lineTo(x, y);
            ctx.moveTo(x + 22, y - 8); ctx.lineTo(x + 22, y + 8); ctx.lineTo(x, y); ctx.fill();
            ctx.beginPath(); ctx.arc(x, y, 12, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI * 2); ctx.stroke();
            ctx.restore();
        }

        function disegnaChupaChups(x, y) {
            ctx.save(); ctx.strokeStyle = "#FFFFFF"; ctx.lineWidth = 5; ctx.lineCap = "round";
            ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + 25, y + 25); ctx.stroke();
            let gradiente = ctx.createRadialGradient(x - 5, y - 5, 2, x, y, 22);
            gradiente.addColorStop(0, '#FFFFFF'); gradiente.addColorStop(0.3, '#FF007F'); gradiente.addColorStop(0.8, '#FFD700');
            ctx.fillStyle = gradiente; ctx.beginPath(); ctx.arc(x, y, 22, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "rgba(255, 255, 255, 0.4)"; ctx.beginPath(); ctx.arc(x - 6, y - 6, 6, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        function loopPrincipale() {
            if (!giocoAvviato) return;

            if (timerFlash > 0) {
                ctx.fillStyle = "#FFD700";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                timerFlash--;
            } else if (sfondoCaricato) {
                ctx.drawImage(sfondoImg, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "#5F9EA0";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            let datiAudio = analizzaAudio();

            if (GRANDEZZA_REATTIVA) {
                orsetto.raggioAttuale = orsetto.raggioBase + (datiAudio.volume * 80);
            } else {
                orsetto.raggioAttuale = orsetto.raggioBase;
            }
            tempoAnimazione += 0.2;

            if (datiAudio.volume > 0.08) {
                let freqBloccata = Math.max(FREQ_MIN, Math.min(FREQ_MAX, datiAudio.frequenza));
                let percentuale = (freqBloccata - FREQ_MIN) / (FREQ_MAX - FREQ_MIN);
                let bersaglioY = canvas.height - (percentuale * (canvas.height - orsetto.raggioAttuale * 2)) - orsetto.raggioAttuale;
                orsetto.y += (bersaglioY - orsetto.y) * 0.12;
            }

            timerCaramelle++;
            if (timerCaramelle > SPAWN_RITMO) {
                let tipoChupa = Math.random() < 0.15;
                let colori = ['#FF1493', '#00FF00', '#FFD700', '#FF4500', '#9400D3'];
                caramelle.push({
                    x: canvas.width + 40,
                    y: Math.random() * (canvas.height - 140) + 70,
                    velocita: (Math.random() * 1.5 + 1) * (VELOCITA_MOLTIPLICATORE / 3),
                    colore: colori[Math.floor(Math.random() * colori.length)],
                    isSuper: tipoChupa
                });
                if (tipoChupa) timerFlash = 8;
                timerCaramelle = 0;
            }

            for (let i = caramelle.length - 1; i >= 0; i--) {
                let c = caramelle[i];
                c.x -= c.velocita * (VELOCITA_MOLTIPLICATORE / 2);

                if (c.isSuper) disegnaChupaChups(c.x, c.y);
                else disegnaCaramella(c.x, c.y, c.colore);

                let distX = orsetto.x - c.x; let distY = orsetto.y - c.y;
                let distanza = Math.sqrt(distX * distX + distY * distY);
                let raggioCollisione = c.isSuper ? (orsetto.raggioAttuale + 26) : (orsetto.raggioAttuale + 20);

                if (distanza < raggioCollisione) {
                    punteggio += c.isSuper ? 5 : 1;
                    playSuonoGnam();
                    caramelle.splice(i, 1);
                    continue;
                }
                if (c.x < -40) caramelle.splice(i, 1);
            }

            disegnaOrsettoCompleto(orsetto.x, orsetto.y, orsetto.raggioAttuale);

            ctx.fillStyle = "white"; ctx.font = "bold 30px Arial"; ctx.strokeStyle = "#2F4F4F"; ctx.lineWidth = 5;
            ctx.strokeText("Punti: " + punteggio, canvas.width - 180, 40); 
            ctx.fillText("Punti: " + punteggio, canvas.width - 180, 40);

            requestAnimationFrame(loopPrincipale);
        }
    </script>
</body>
</html>
